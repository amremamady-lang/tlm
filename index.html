/* ===== TLM Construct — design tokens & utilities ===== */
:root {
  /* tweakable */
  --accent: #18A6E4;      /* logo cyan-blue */
  --accent-bright: #4FD3FF;
  --accent-2: #FF2BD6;    /* magenta */
  --neon: 0.6;            /* glow intensity 0..1 */
  --radius: 16px;
  --bg: #0A0C10;
  --bg-2: #0D1119;

  /* derived */
  --panel: rgba(255,255,255,0.035);
  --panel-2: rgba(255,255,255,0.06);
  --border: rgba(255,255,255,0.09);
  --border-strong: rgba(255,255,255,0.16);
  --text: #EAF0F6;
  --muted: #8C99AB;
  --muted-2: #5C6878;

  --font-display: "Saira", system-ui, sans-serif;
  --font-body: "Sora", system-ui, sans-serif;
}

* { box-sizing: border-box; }
html { scroll-behavior: smooth; }
body {
  margin: 0;
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-body);
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
  overflow-x: hidden;
}

/* ---- Background: subtle moving grid + vignette ---- */
.bg-grid {
  position: fixed;
  inset: -40px;
  z-index: 0;
  pointer-events: none;
  background-image:
    linear-gradient(to right, rgba(255,255,255,0.035) 1px, transparent 1px),
    linear-gradient(to bottom, rgba(255,255,255,0.035) 1px, transparent 1px);
  background-size: 64px 64px;
  mask-image: radial-gradient(120% 90% at 50% 0%, #000 35%, transparent 100%);
  -webkit-mask-image: radial-gradient(120% 90% at 50% 0%, #000 35%, transparent 100%);
  animation: gridDrift 40s linear infinite;
}
@keyframes gridDrift { to { background-position: 64px 64px; } }
.bg-glow {
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
  background:
    radial-gradient(60% 50% at 82% -5%, color-mix(in srgb, var(--accent) 22%, transparent), transparent 70%),
    radial-gradient(55% 45% at 8% 8%, color-mix(in srgb, var(--accent-2) 12%, transparent), transparent 70%);
  opacity: calc(0.5 + 0.5 * var(--neon));
}
@media (prefers-reduced-motion: reduce) {
  .bg-grid { animation: none; }
}

/* ---- Typography ---- */
.font-display { font-family: var(--font-display); }
.display {
  font-family: var(--font-display);
  font-weight: 800;
  line-height: 0.95;
  letter-spacing: -0.01em;
}
.eyebrow {
  font-family: var(--font-display);
  font-weight: 700;
  letter-spacing: 0.32em;
  text-transform: uppercase;
  font-size: 0.72rem;
  color: var(--accent-bright);
}

/* ---- Neon helpers ---- */
.text-accent { color: var(--accent-bright); }
.neon-text {
  color: var(--accent-bright);
  text-shadow: 0 0 calc(18px * var(--neon)) color-mix(in srgb, var(--accent) 70%, transparent),
               0 0 calc(40px * var(--neon)) color-mix(in srgb, var(--accent) 40%, transparent);
}
.neon-text-2 {
  color: #FF6BE3;
  text-shadow: 0 0 calc(18px * var(--neon)) color-mix(in srgb, var(--accent-2) 70%, transparent),
               0 0 calc(40px * var(--neon)) color-mix(in srgb, var(--accent-2) 40%, transparent);
}
.neon-ring {
  box-shadow: 0 0 calc(16px * var(--neon)) color-mix(in srgb, var(--accent) 55%, transparent),
              inset 0 0 calc(10px * var(--neon)) color-mix(in srgb, var(--accent) 25%, transparent);
}

/* ---- Glass surfaces ---- */
.glass {
  background: linear-gradient(180deg, rgba(255,255,255,0.05), rgba(255,255,255,0.02));
  border: 1px solid var(--border);
  backdrop-filter: blur(14px) saturate(140%);
  -webkit-backdrop-filter: blur(14px) saturate(140%);
}
.card {
  background: linear-gradient(180deg, var(--panel-2), var(--panel));
  border: 1px solid var(--border);
  border-radius: var(--radius);
  transition: border-color .35s ease, transform .35s ease, box-shadow .35s ease;
}
.card-hover:hover {
  transform: translateY(-4px);
  border-color: color-mix(in srgb, var(--accent) 55%, transparent);
  box-shadow: 0 18px 40px -22px rgba(0,0,0,0.9),
              0 0 calc(34px * var(--neon)) color-mix(in srgb, var(--accent) 28%, transparent);
}

/* ---- Buttons ---- */
.btn {
  display: inline-flex; align-items: center; gap: 0.55rem;
  font-family: var(--font-display); font-weight: 700;
  letter-spacing: 0.02em;
  padding: 0.85rem 1.5rem;
  border-radius: calc(var(--radius) * 0.7);
  cursor: pointer; border: 1px solid transparent;
  transition: transform .25s ease, box-shadow .35s ease, background .3s ease, border-color .3s ease, color .3s ease;
  text-decoration: none; white-space: nowrap;
}
.btn-primary {
  background: linear-gradient(180deg, color-mix(in srgb, var(--accent) 92%, white), var(--accent));
  color: #04141d;
  box-shadow: 0 0 calc(26px * var(--neon)) color-mix(in srgb, var(--accent) 55%, transparent),
              0 8px 22px -10px color-mix(in srgb, var(--accent) 70%, transparent);
}
.btn-primary:hover {
  transform: translateY(-2px);
  box-shadow: 0 0 calc(44px * var(--neon)) color-mix(in srgb, var(--accent) 75%, transparent),
              0 12px 28px -10px color-mix(in srgb, var(--accent) 80%, transparent);
}
.btn-ghost {
  background: var(--panel);
  border-color: var(--border-strong);
  color: var(--text);
}
.btn-ghost:hover {
  transform: translateY(-2px);
  border-color: color-mix(in srgb, var(--accent) 60%, transparent);
  color: var(--accent-bright);
  box-shadow: 0 0 calc(26px * var(--neon)) color-mix(in srgb, var(--accent) 22%, transparent);
}

/* ---- Links / nav ---- */
.navlink {
  position: relative;
  font-family: var(--font-display); font-weight: 600;
  font-size: 0.95rem; letter-spacing: 0.02em;
  color: var(--muted); text-decoration: none;
  padding: 0.4rem 0.1rem; transition: color .25s ease;
}
.navlink:hover { color: var(--text); }
.navlink::after {
  content: ""; position: absolute; left: 0; right: 0; bottom: -2px; height: 2px;
  background: var(--accent-bright); border-radius: 2px;
  transform: scaleX(0); transform-origin: left; transition: transform .3s ease;
  box-shadow: 0 0 calc(12px * var(--neon)) var(--accent);
}
.navlink:hover::after { transform: scaleX(0.5); }
.navlink.active { color: var(--text); }
.navlink.active::after { transform: scaleX(1); }

/* ---- Section + container ---- */
.container-tlm { width: min(1180px, 92vw); margin: 0 auto; }
.section { position: relative; z-index: 1; padding: clamp(4rem, 9vw, 8rem) 0; }

/* ---- Divider line ---- */
.hr-neon {
  height: 1px; border: 0;
  background: linear-gradient(90deg, transparent, color-mix(in srgb, var(--accent) 60%, transparent), transparent);
}

/* ---- Pillar / chip ---- */
.chip {
  display: inline-flex; align-items: center; gap: 0.5rem;
  font-family: var(--font-display); font-weight: 600; font-size: 0.78rem;
  letter-spacing: 0.06em; text-transform: uppercase;
  padding: 0.4rem 0.8rem; border-radius: 999px;
  border: 1px solid var(--border-strong); background: var(--panel);
  color: var(--muted);
}

/* ---- Scroll reveal (transform-only so a frozen frame is never invisible) ---- */
.reveal { opacity: 1; transform: none; }
.reveal.armed { transform: translateY(22px); }
.reveal.armed.in {
  transform: none;
  transition: transform .7s cubic-bezier(.2,.7,.2,1);
}
@media (prefers-reduced-motion: reduce) {
  .reveal { transform: none !important; }
}

/* ---- Page transition (transform-only, opacity always 1) ---- */
.page-enter { opacity: 1; transform: none; }
.page-enter.armed { transform: translateY(12px); }
.page-enter.armed.in {
  transform: none;
  transition: transform .45s cubic-bezier(.2,.7,.2,1);
}
@media (prefers-reduced-motion: reduce) {
  .page-enter { transform: none !important; }
}

/* ---- Photo placeholder ---- */
.photo-ph {
  position: relative; overflow: hidden;
  background:
    repeating-linear-gradient(45deg, rgba(255,255,255,0.02) 0 14px, rgba(255,255,255,0.04) 14px 28px),

.photo-ph::after {

.ph-label {
  position: relative; z-index: 1;

/* scrollbar */
::-webkit-scrollbar { width: 10px; height: 10px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: #1d2530; border-radius: 8px; border: 2px solid var(--bg); }
::-webkit-scrollbar-thumb:hover { background: #283341; }

::selection { background: color-mix(in srgb, var(--accent) 40%, transparent); color: #fff; }

// ── useTweaks ───────────────────────────────────────────────────────────────
// Single source of truth for tweak values. setTweak persists via the host
// (__edit_mode_set_keys → host rewrites the EDITMODE block on disk).
function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  // Accepts either setTweak('key', value) or setTweak({ key: value, ... }) so a
  // useState-style call doesn't write a "[object Object]" key into the persisted
  // JSON block.
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
    // Same-window signal so in-page listeners (deck-stage rail thumbnails)
    // can react — the parent message only reaches the host, not peers.
    window.dispatchEvent(new CustomEvent('tweakchange', { detail: edits }));
  }, []);
  return [values, setTweak];
}

// ── TweaksPanel ─────────────────────────────────────────────────────────────
// Floating shell. Registers the protocol listener BEFORE announcing
// availability — if the announce ran first, the host's activate could land
// before our handler exists and the toolbar toggle would silently no-op.
// The close button posts __edit_mode_dismissed so the host's toolbar toggle
// flips off in lockstep; the host echoes __deactivate_edit_mode back which
// is what actually hides the panel.
function TweaksPanel({ title = 'Tweaks', children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" data-omelette-chrome=""
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">
          {children}
        </div>
      </div>
    </>
  );
}

// ── Layout helpers ──────────────────────────────────────────────────────────

function TweakSection({ label, children }) {
  return (
    <>
      <div className="twk-sect">{label}</div>
      {children}
    </>
  );
}

function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl">
        <span>{label}</span>
        {value != null && <span className="twk-val">{value}</span>}
      </div>
      {children}
    </div>
  );
}

// ── Controls ────────────────────────────────────────────────────────────────

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  // The active value is read by pointer-move handlers attached for the lifetime
  // of a drag — ref it so a stale closure doesn't fire onChange for every move.
  const valueRef = React.useRef(value);
  valueRef.current = value;

  // Segments wrap mid-word once per-segment width runs out. The track is
  // ~248px (280 panel − 28 body pad − 4 seg pad), each button loses 12px
  // to its own padding, and 11.5px system-ui averages ~6.3px/char — so 2
  // options fit ~16 chars each, 3 fit ~10. Past that (or >3 options), fall
  // back to a dropdown rather than wrap.
  const labelLen = (o) => String(typeof o === 'object' ? o.label : o).length;
  const maxLen = options.reduce((m, o) => Math.max(m, labelLen(o)), 0);
  const fitsAsSegments = maxLen <= ({ 2: 16, 3: 10 }[options.length] ?? 0);
  if (!fitsAsSegments) {
    // <select> emits strings — map back to the original option value so the
    // fallback stays type-preserving (numbers, booleans) like the segment path.
    const resolve = (s) => {
      const m = options.find((o) => String(typeof o === 'object' ? o.value : o) === s);
      return m === undefined ? s : typeof m === 'object' ? m.value : m;
    };
    return <TweakSelect label={label} value={value} options={options}
                        onChange={(s) => onChange(resolve(s))} />;
  }
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>

             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

// Relative-luminance contrast pick — checkmarks drawn over a swatch need to
// read on both #111 and #fafafa without per-option configuration. Hex input
// only (#rgb / #rrggbb); named or rgb()/hsl() colors fall through to "light".
function __twkIsLight(hex) {
  const h = String(hex).replace('#', '');
  const x = h.length === 3 ? h.replace(/./g, (c) => c + c) : h.padEnd(6, '0');
  const n = parseInt(x.slice(0, 6), 16);
  if (Number.isNaN(n)) return true;
  const r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255;
  return r * 299 + g * 587 + b * 114 > 148000;
}

    <path d="M3 7.2 5.8 10 11 4.2" fill="none" strokeWidth="2.2"

// hex string or an array of 1-5 hex strings; the card adapts — a lone color
// renders solid, a palette renders colors[0] as the hero (left ~2/3) with the
// rest stacked in a sharp column on the right. onChange emits the
// option in the shape it was passed (string stays string, array stays array).
// Without options it falls back to the native color input for back-compat.
function TweakColor({ label, value, options, onChange }) {
  if (!options || !options.length) {
    return (
      <div className="twk-row twk-row-h">
        <div className="twk-lbl"><span>{label}</span></div>
        <input type="color" className="twk-swatch" value={value}
               onChange={(e) => onChange(e.target.value)} />
      </div>
    );
  }
  // Native <input type=color> emits lowercase hex per the HTML spec, so
  // compare case-insensitively. String() guards JSON.stringify(undefined),
  // which returns the primitive undefined (no .toLowerCase).
  const key = (o) => String(JSON.stringify(o)).toLowerCase();
  const cur = key(value);
  return (
    <TweakRow label={label}>
      <div className="twk-chips" role="radiogroup">
        {options.map((o, i) => {
          const colors = Array.isArray(o) ? o : [o];
          const [hero, ...rest] = colors;
          const sup = rest.slice(0, 4);
          const on = key(o) === cur;
          return (
            <button key={i} type="button" className="twk-chip" role="radio"
                    aria-checked={on} data-on={on ? '1' : '0'}
                    aria-label={colors.join(', ')} title={colors.join(' · ')}
                    style={{ background: hero }}
                    onClick={() => onChange(o)}>
              {sup.length > 0 && (
                <span>
                  {sup.map((c, j) => <i key={j} style={{ background: c }} />)}
                </span>
              )}
              {on && <__TwkCheck light={__twkIsLight(hero)} />}
            </button>
          );
        })}
      </div>
    </TweakRow>
  );
}

function TweakButton({ label, onClick, secondary = false }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
            onClick={onClick}>{label}</button>
  );
}

  TweakText, TweakNumber, TweakColor, TweakButton,

function Reveal({ children, delay = 0, as = "div", className = "" }) {
  const ref = useRef(null);
  useEffect(() => {
    const el = ref.current;
    if (!el) return;
    const reduce = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
    // Only arm the hidden start when the document is actually visible, keeps
    // content visible for off-screen renders / screenshot capture.
    if (document.hidden || reduce) return;
    el.classList.add("armed");
    const io = new IntersectionObserver((entries) => {
      entries.forEach((e) => { if (e.isIntersecting) { el.classList.add("in"); io.unobserve(el); } });
    }, { threshold: 0.12, rootMargin: "0px 0px -8% 0px" });
    io.observe(el);
    return () => io.disconnect();
  }, []);

function ContactPage() {
  const b = window.TLM.business;
  const projectTypes = [
    "TIG-lassen", "LED & ambient verlichting", "Metaalconstructie op maat",
    "Engines & herstelling", "Trucks & trailers", "Sound & offroad", "Iets anders",
  ];
  const [form, setForm] = useState({ name: "", email: "", phone: "", type: "", message: "" });
  const [errors, setErrors] = useState({});
  const [sent, setSent] = useState(false);

  const set = (k, v) => { setForm((f) => ({ ...f, [k]: v })); setErrors((e) => ({ ...e, [k]: undefined })); };

  const validate = () => {
    const e = {};
    if (!form.name.trim()) e.name = "Vul je naam in.";
    if (!form.email.trim()) e.email = "Vul je e-mail in.";
    else if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(form.email)) e.email = "Geen geldig e-mailadres.";
    if (!form.type) e.type = "Kies een type project.";
    if (!form.message.trim()) e.message = "Vertel kort over je project.";
    return e;
  };

  const submit = (ev) => {
    ev.preventDefault();
    const e = validate();
    setErrors(e);
    if (Object.keys(e).length === 0) setSent(true);
  };

  const field = "w-full bg-[var(--panel)] border rounded-xl px-4 py-3.5 text-white placeholder-[var(--muted-2)] outline-none transition-colors duration-200 focus:border-[var(--accent-bright)]";

  return (

              {[
                { label: "E-mail", value: b.email, href: `mailto:${b.email}` },
                { label: "Telefoon", value: b.phone, href: `tel:${b.phone.replace(/\s/g,"")}` },
                { label: "Adres", value: `${b.address}, ${b.city}`, href: b.mapsUrl, ext: true },
                { label: "Instagram", value: b.instagram, href: b.instagramUrl, ext: true },
              ].map((c) => (
                <a key={c.label} href={c.href} target={c.ext ? "_blank" : undefined} rel="noreferrer"
                   className="card card-hover p-6 group">
                  <div className="text-xs font-display tracking-[0.18em] uppercase text-[var(--muted-2)]">{c.label}</div>
                  <div className="mt-1.5 font-display font-bold text-lg text-white group-hover:text-[var(--accent-bright)] transition-colors break-words">{c.value}</div>
                </a>
              ))}

              <div className="card p-6">
                <div className="text-xs font-display tracking-[0.18em] uppercase text-[var(--muted-2)] mb-4">Openingsuren</div>
                <ul className="flex flex-col gap-2.5">
                  {b.hours.map(([d, h]) => (
                    <li key={d} className="flex items-center justify-between gap-4">
                      <span className="text-[var(--muted)]">{d}</span>
                      <span className={`font-display font-semibold ${h === "Gesloten" ? "text-[var(--muted-2)]" : "text-white"}`}>{h}</span>
                    </li>
                  ))}
                </ul>
                <div className="mt-5 pt-4 border-t border-[var(--border)] text-[var(--muted-2)] text-xs font-display tracking-wide">BTW {b.vat}</div>
              </div>
            </div>
          </Reveal>

          {/* form */}
          <Reveal delay={120}>
            <div className="card p-7 md:p-9">
              {sent ? (
                <div className="text-center py-10">
                  <h3 className="display text-2xl text-white">Bedankt, {form.name.split(" ")[0] || "alvast"}!</h3>
                  <p className="mt-3 text-[var(--muted)] max-w-sm mx-auto">
                    We hebben je aanvraag voor <span className="text-[var(--accent-bright)]">{form.type}</span> ontvangen
                    en nemen snel contact op.
                  </p>
                  <button onClick={() => { setSent(false); setForm({ name: "", email: "", phone: "", type: "", message: "" }); }}
                          className="btn btn-ghost mt-7 mx-auto">Nieuw bericht</button>
                </div>
              ) : (
                <form onSubmit={submit} noValidate>
                  <h3 className="display text-2xl text-white mb-1">Contacteer ons</h3>
                  <p className="text-[var(--muted)] mb-7 text-sm">Velden met * zijn verplicht.</p>

                  <div className="grid sm:grid-cols-2 gap-4">
                    <Field label="Naam *" error={errors.name}>
                      <input className={`${field} ${errors.name ? "border-[#ff5470]" : "border-[var(--border-strong)]"}`}
                             value={form.name} onChange={(e) => set("name", e.target.value)} placeholder="Jouw naam" />
                    </Field>
                    <Field label="Telefoon" error={errors.phone}>
                      <input className={`${field} border-[var(--border-strong)]`} value={form.phone}
                             onChange={(e) => set("phone", e.target.value)} placeholder="+32 ..." />
                    </Field>
                  </div>
                  <div className="mt-4">
                    <Field label="E-mail *" error={errors.email}>
                      <input type="email" className={`${field} ${errors.email ? "border-[#ff5470]" : "border-[var(--border-strong)]"}`}
                             value={form.email} onChange={(e) => set("email", e.target.value)} placeholder="jij@voorbeeld.be" />
                    </Field>
                  </div>
                  <div className="mt-4">
                    <Field label="Type project *" error={errors.type}>
                      <div className="relative">
                        <select className={`${field} appearance-none pr-10 ${errors.type ? "border-[#ff5470]" : "border-[var(--border-strong)]"} ${form.type ? "text-white" : "text-[var(--muted-2)]"}`}
                                value={form.type} onChange={(e) => set("type", e.target.value)}>
                          <option value="" disabled>Kies een type…</option>
                          {projectTypes.map((t) => <option key={t} value={t} className="text-black">{t}</option>)}
                        </select>
                        <span className="pointer-events-none absolute right-4 top-1/2 -translate-y-1/2 w-2 h-2 border-r-2 border-b-2 border-[var(--accent-bright)] rotate-45 -mt-1"></span>
                      </div>
                    </Field>
                  </div>
                  <div className="mt-4">
                    <Field label="Bericht *" error={errors.message}>
                      <textarea rows={5} className={`${field} resize-none ${errors.message ? "border-[#ff5470]" : "border-[var(--border-strong)]"}`}
                                value={form.message} onChange={(e) => set("message", e.target.value)}
                                placeholder="Vertel kort over je voertuig en wat je wil laten doen…" />
                    </Field>
                  </div>
                  <button type="submit" className="btn btn-primary w-full justify-center mt-7">Verstuur aanvraag</button>
                </form>
              )}
            </div>
          </Reveal>
        </div>
      </section>

      {/* kaart / locatie */}
      <section className="section pt-0">
        <div className="container-tlm">
          <Reveal>
            <div className="card overflow-hidden p-0">
              <iframe
                title="Locatie TLM Construct"
                src={`https://www.google.com/maps?q=${encodeURIComponent(b.address + ", " + b.city)}&output=embed`}
                className="block w-full h-[340px] md:h-[440px]"
                style={{ border: 0 }}
                loading="lazy"
                referrerPolicy="no-referrer-when-downgrade"
                allowFullScreen
              ></iframe>
            </div>
          </Reveal>
        </div>
      </section>
    </div>
  );
}

function Field({ label, error, children }) {
  return (
    <label className="block">
      <span className="block mb-2 text-sm font-display font-semibold tracking-wide text-[var(--muted)]">{label}</span>
      {children}
      {error && <span className="block mt-1.5 text-xs text-[#ff7a90]">{error}</span>}
    </label>
  );
}

Object.assign(window, { PortfolioPage, PortfolioCard, AboutPage, ContactPage, Field });

  </script>
  <script type="text/babel">
/* ===== TLM Construct, app: router + tweaks + mount ===== */

function parseRoute() {
  let h = window.location.hash.replace(/^#/, "");
  if (!h || h === "/") return { name: "home", path: "/" };
  const parts = h.split("/").filter(Boolean); // e.g. ["diensten","tig-welding"]
  if (parts[0] === "diensten") {
    if (parts[1]) return { name: "service", slug: parts[1], path: h };
    return { name: "diensten", path: h };
  }
  if (parts[0] === "realisaties") return { name: "realisaties", path: h };
  if (parts[0] === "over-ons") return { name: "over-ons", path: h };
  if (parts[0] === "contact") return { name: "contact", path: h };
  return { name: "home", path: "/" };
}

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "accent": "#18A6E4",
  "accent2": "#FF2BD6",
  "neon": 0.18,
  "radius": 16,
  "bg": "#0A0C10",
  "font": "Saira"
}/*EDITMODE-END*/;

const FONT_BG = { "#08090C": "#0B0D12", "#0A0C10": "#0D1119", "#0E1219": "#121826" };

function applyTweaks(t) {
  const r = document.documentElement.style;
  // derive a brighter version of accent for glow text
  r.setProperty("--accent", t.accent);
  r.setProperty("--accent-bright", brighten(t.accent, 0.42));
  r.setProperty("--accent-2", t.accent2);
  r.setProperty("--neon", String(t.neon));
  r.setProperty("--radius", t.radius + "px");
  r.setProperty("--bg", t.bg);
  r.setProperty("--bg-2", FONT_BG[t.bg] || "#0D1119");
  r.setProperty("--font-display", `"${t.font}", system-ui, sans-serif`);
}

function brighten(hex, amt) {
  const m = hex.replace("#", "");
  const n = parseInt(m.length === 3 ? m.split("").map((c) => c + c).join("") : m, 16);
  let R = (n >> 16) & 255, G = (n >> 8) & 255, B = n & 255;
  R = Math.round(R + (255 - R) * amt);
  G = Math.round(G + (255 - G) * amt);
  B = Math.round(B + (255 - B) * amt);
  return "#" + [R, G, B].map((v) => v.toString(16).padStart(2, "0")).join("");
}

function App() {
  const [route, setRoute] = useState(parseRoute());
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);

  useEffect(() => {
    const onHash = () => { setRoute(parseRoute()); window.scrollTo({ top: 0, behavior: "auto" }); };
    window.addEventListener("hashchange", onHash);
    return () => window.removeEventListener("hashchange", onHash);
  }, []);

  useEffect(() => { applyTweaks(t); }, [t]);

  // When the document goes hidden, snap any in-flight entrance animation to its
  // settled (visible) state, paused transitions/animations otherwise strand
  // content at opacity 0 for off-screen renders & screenshot capture.
  useEffect(() => {
    const snap = () => {
      if (!document.hidden) return;
      document.querySelectorAll(".armed").forEach((el) => el.classList.remove("armed", "in"));
    };
    document.addEventListener("visibilitychange", snap);
    return () => document.removeEventListener("visibilitychange", snap);
  }, []);

  // trigger page entrance transition on every route change.
  // Only arm the hidden start when visible; otherwise content stays visible
  // (capture-safe, paused transitions can't strand content at opacity 0).
  useEffect(() => {
    const el = document.querySelector(".page-enter");
    if (!el) return;
    el.classList.remove("armed", "in");
    const reduce = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
    if (document.hidden || reduce) return;
    el.classList.add("armed");
    const id = setTimeout(() => el.classList.add("in"), 40);
    return () => clearTimeout(id);
  }, [route.path]);

  const navigate = (to) => { window.location.hash = to; };

  let page;
  switch (route.name) {
    case "diensten": page = <ServicesPage navigate={navigate} />; break;
    case "service": page = <ServiceDetailPage slug={route.slug} navigate={navigate} />; break;
    case "realisaties": page = <PortfolioPage />; break;
    case "over-ons": page = <AboutPage />; break;
    case "contact": page = <ContactPage />; break;
    default: page = <HomePage navigate={navigate} />;
  }

  return (
    <React.Fragment>
      <div className="bg-glow"></div>
      <div className="bg-grid"></div>
      <Navbar route={route.path} />
      <main key={route.path} className="relative z-10 min-h-[60vh]">{page}</main>
      <Footer />

      <TweaksPanel>
        <TweakSection label="Accent" />
        <TweakColor label="Hoofdkleur" value={t.accent}
          options={["#18A6E4", "#19E3FF", "#22D3EE", "#3B82F6"]}
          onChange={(v) => setTweak("accent", v)} />
        <TweakColor label="Tweede accent" value={t.accent2}
          options={["#FF2BD6", "#F43F5E", "#A855F7", "#FB7185"]}
          onChange={(v) => setTweak("accent2", v)} />
        <TweakSlider label="Neon-intensiteit" value={t.neon} min={0} max={1} step={0.05}
          onChange={(v) => setTweak("neon", v)} />

        <TweakSection label="Sfeer" />
        <TweakColor label="Achtergrond" value={t.bg}
          options={["#08090C", "#0A0C10", "#0E1219"]}
          onChange={(v) => setTweak("bg", v)} />
        <TweakSlider label="Hoekradius" value={t.radius} min={4} max={26} step={1} unit="px"
          onChange={(v) => setTweak("radius", v)} />

        <TweakSection label="Typografie" />
        <TweakRadio label="Display-font" value={t.font}
          options={["Saira", "Archivo", "Oswald"]}
          onChange={(v) => setTweak("font", v)} />
      </TweaksPanel>
    </React.Fragment>
  );
}

applyTweaks(TWEAK_DEFAULTS);
ReactDOM.createRoot(document.getElementById("root")).render(<App />);

  </script>

      <text x="50" y="54" text-anchor="middle" font-family="sans-serif" font-weight="800" font-size="22" fill="#19E3FF">TLM</text>
